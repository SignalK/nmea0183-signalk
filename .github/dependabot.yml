version: 2
updates:
  # npm: weekly bumps, groups minor+patch into one PR, majors individual
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # chai-things (abandoned since 2014) only works with chai 4.x.
      # Re-enable after migrating test suite off chai-things.
      - dependency-name: chai
        update-types:
          - version-update:semver-major
      # prettier 3 changes default formatting; needs a tree-wide reformat
      # commit. Re-enable after that lands.
      - dependency-name: prettier
        update-types:
          - version-update:semver-major
    labels:
      - dependencies

  # GitHub Actions: weekly, one grouped PR for everything
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - minor
          - patch
          - major
    labels:
      - dependencies
